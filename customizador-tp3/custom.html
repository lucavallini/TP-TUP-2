<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="custom-style.css">
</head>
<body>
    <section class="sections">
        <h2 class="center-txt">Background-color</h2>
        <div class="button-customer margin-20" id="bg-div">
            <button class="bg-col-pink button-style">pink</button>
            <button class="bg-col-orange button-style">orange</button>
            <button class="bg-col-yellow button-style">yellow</button>
            <button class="bg-col-green button-style">green</button>
            <button class="bg-col-lightblue button-style">lightblue</button>
            <button class="bg-col-purple button-style">purple</button>
        </div>


        <h2 class="center-txt">Fonts</h2>
        <div class="button-customer margin-20" id="font-div">
            <button class="font-arial button-style">Arial</button>
            <button class="font-verdana button-style">Verdana</button>
            <button class="font-tahoma button-style">Tahoma</button>
            <button class="font-times-new-roman button-style">Times New Roman</button>
            <button class="font-georgia button-style">Georgia</button>
            <button class="font-courier-new button-style">Courier New</button>
        </div>


        <h2 class="center-txt">Color-font</h2>
        <div class="button-customer margin-20" id="font-col-div">
            <button class="font-col-pink button-style">pink-font</button>
            <button class="font-col-orange button-style">orange-font</button>
            <button class="font-col-yellow button-style">yellow-font</button>
            <button class="font-col-green button-style">green-font</button>
            <button class="font-col-lightblue button-style">lightblue-font</button>
            <button class="font-col-purple button-style">purple-font</button>
        </div>
    </section>





    <section class="sections">
        <h2 class="center-txt">Customizador</h2>
        <div class="">
            <button class="main-button">Example</button>
        </div>
        <div class="">
            <form class="form-style">
                <input  maxlength="40" type="text" id="input-text" placeholder="Escribi aca...">
                <button class="form-button" type="submit">Submit</button>
            </form>
        </div>
    </section>




    <section class="sections">
        <h2 class="center-txt">Shadow</h2>
        <div class="button-customer margin-20" id="shadow-div">
            <button class="button-style shadow-none">shadow</button>
            <button class="button-style shadow-subtle">shadow</button>
            <button class="button-style shadow-high">shadow</button>
            <button class="button-style shadow-solid">shadow</button>
            <button class="button-style shadow-bright">shadow</button>
            <button class="button-style shadow-inset">shadow</button>
        </div>


        <h2 class="center-txt">Border</h2>
        <div class="button-customer margin-20" id="border-div">
            <button class="button-style border-none">none</button>
            <button class="button-style border-thin">thin</button>
            <button class="button-style border-radius">radius</button>
            <button class="button-style border-pill">pill</button>
            <button class="button-style border-bottom">bottom</button>
            <button class="button-style border-double">double</button>
        </div>


        <h2 class="center-txt">Degrade</h2>
        <div class="button-customer margin-20" id="degrade-div">
            <button class="button-style gradient-1">degrade</button>
            <button class="button-style gradient-2">degrade</button>
            <button class="button-style gradient-3">degrade</button>
            <button class="button-style gradient-4">degrade</button>
            <button class="button-style gradient-5">degrade</button>
            <button class="button-style gradient-6">degrade</button>
        </div>
    </section>

    <script src="custom-js.js"></script>
</body>
</html>
