<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Trabajo práctico 1</title>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        .wrapper {
            /* TODO: clearfix moderno — evitar colapso del padre */
            display: flow-root;
            width: 100%;
        }

        .sidebar {
            /* TODO: float izquierda, 28% de ancho, 2% de margen derecho */
            float: left;
            width: 28%;
            margin-right: 2%;
            height: 400px;
            background: #6c63ff;
        }

        .main {
            /* TODO: float izquierda, 70% de ancho */
            float: left;
            width: 70%;
            height: 400px;
            background: #1c2235;
        }


        .col       { float: left; height: 300px; }
        .col-20    { width: 20%; }
        .col-60    { width: 60%; }
        .bg-violet { background: #6c63ff; }
        .bg-dark   { background: #161b27; }
        .bg-red    { background: #ff6584; }
        .bg-darker { background: #232a3e; }
        .bg-black  { background: #0e1117; }
        .bg-green  { background: #22c55e; }
        .bg-yellow { background: #f59e0b; }
        .bg-cyan   { background: #06b6d4; }
        .bg-pink   { background: #ec4899; }
        .bg-dark-page {background: #0b0e17}
        .h-full    { height: 60px; display: block; }
        .clear     { clear: both; }
        .cf        { display: flow-root; }
        .txt-center { text-align: center; }
        .padding-40 { padding: 40px; }

        .grid-cards { 
             /* elimina gap entre inline-blocks */
            font-size: 0; 
        }
        .card {
            display: inline-block;
            /* TODO: width 31.33%, margin 1%, height 140px, vertical-align top */
            border-radius: 8px;
            font-size: 16px;  /* restaurar font-size para contenido interno */
            width: 31.33%;
            margin: 1%;
            height: 140px;
            vertical-align: top;
        }

        .separator {
            width: 100%;
            height: 100px;
            background: #ffffff;
        }
    </style>


</head>
<body>

    <div class="wrapper">
        <div class="sidebar"></div>
        <div class="main"></div>
    </div>

    
    <div class="separator txt-center padding-40"> <p>Separador de actividades</p> </div>
    

    <div class="h-full bg-darker clear "></div>
    <div class="cf">
        <div class="col col-20 bg-violet cf "></div>
        <div class="col col-60 bg-dark cf "></div>
        <div class="col col-20 bg-red cf"></div>
    </div>
    <div class="h-full bg-black clear"></div> 


    <div class="separator txt-center padding-40"> <p>Separador de actividades</p></div>

    <div class="grid-cards bg-dark-page">
        <div class="card bg-green"></div>
        <div class="card bg-yellow"></div>
        <div class="card bg-cyan"></div>
        <div class="card bg-pink"></div>
        <div class="card bg-violet"></div>
        <div class="card bg-dark"></div>
    </div>
    

</body>
</html>
